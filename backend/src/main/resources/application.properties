# ── FitDesk backend (Quarkus) · configuración Fase 1 ──────────────────
quarkus.application.name=fitdesk-backend
# Local usa 8080; en Render (u otro PaaS) el puerto llega por la env var PORT.
quarkus.http.port=${PORT:8080}

# ── Datasource: Postgres local del docker-compose ─────────────────────
# En AWS la URL/credenciales saldrán de Secrets Manager (no se hardcodean).
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=fitdesk
quarkus.datasource.password=fitdesk_local
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/fitdesk

# ── Hibernate ORM: el esquema lo administra Flyway, NO Hibernate ──────
quarkus.hibernate-orm.database.generation=none
# Campos camelCase → columnas snake_case (helpdeskUserId → helpdesk_user_id).
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ── Flyway: aplica las migraciones del modelo nacional al arrancar ────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# ── CORS (el frontend Angular hablará solo con Quarkus) ───────────────
# En Quarkus 3.37 la clave booleana `quarkus.http.cors` ya no existe; es
# `quarkus.http.cors.enabled`. Orígenes: dev server de Angular (`ng serve`).
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,X-Actor-Hid

# ── ETL Fase 2: rutas del snapshot de Firebase y la tabla de identidades ─
# Relativas al directorio de trabajo del backend (backend/). El snapshot lo
# genera scripts/extract-firebase.sh (solo lectura); el import es idempotente.
fitdesk.etl.snapshot-path=../docs/exports/firebase-snapshot-latest.json
fitdesk.etl.identities-path=../docs/knowledge/identidades.csv

# ── Proxy al HelpDesk (Fase 3): Quarkus reenvía /api/v1/* al API del HelpDesk ──
# Reemplaza el proxy del dev server de Angular y el Cloudflare Worker.
fitdesk.helpdesk.base-url=https://helpdesk-api.fit-bank.com/api/v1

# Autenticación NO proactiva: con smallrye-jwt en el classpath, el modo proactivo
# (default) intenta validar CUALQUIER `Authorization: Bearer` como JWT propio y
# rechaza (401) el token del HelpDesk ANTES de llegar al proxy. En lazy mode solo
# se autentica en endpoints que lo exijan (ninguno aún) → el Bearer pasa al HelpDesk.
quarkus.http.auth.proactive=false
