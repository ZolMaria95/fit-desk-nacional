# Nginx para el SPA de FitDesk. Hash routing (#/ruta) no necesita fallback, pero
# se deja try_files por si se usan rutas por path. Assets estáticos cacheados.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip para JS/CSS/JSON.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # El index no se cachea (para tomar bundles nuevos); los assets con hash sí.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
